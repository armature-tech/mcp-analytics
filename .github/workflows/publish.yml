name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.repository == 'armature-tech/mcp-analytics'
    environment: sdk-canary-dev
    env:
      SDK_CANARY_INGEST_KEY: ${{ secrets.SDK_CANARY_INGEST_KEY }}
      SDK_CANARY_READ_API_KEY: ${{ secrets.SDK_CANARY_READ_API_KEY }}
      SDK_CANARY_MCP_SERVER_ID: ${{ vars.SDK_CANARY_MCP_SERVER_ID }}
      SDK_CANARY_PLATFORM_URL: ${{ vars.SDK_CANARY_PLATFORM_URL }}
      SDK_CANARY_DISPATCH_SECRET: ${{ secrets.SDK_CANARY_DISPATCH_SECRET }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_SCOPE: ${{ vars.VERCEL_SCOPE }}
      SDK_CANARY_VERCEL_PROJECT_ID: ${{ vars.SDK_CANARY_VERCEL_PROJECT_ID }}
      SDK_CANARY_MCP_URL: ${{ vars.SDK_CANARY_MCP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether this commit is already released
        id: existing_release
        run: |
          set -euo pipefail
          tag="$(git tag --points-at HEAD --list 'v*' | sort -V | tail -1 || true)"
          if [[ -n "${tag}" ]]; then
            echo "Commit ${GITHUB_SHA} already has release tag ${tag}; skipping publish."
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup Node
        if: steps.existing_release.outputs.published != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: "https://registry.npmjs.org"
          scope: "@armature-tech"

      - name: Install dependencies
        if: steps.existing_release.outputs.published != 'true'
        run: npm ci

      - name: Run checks
        if: steps.existing_release.outputs.published != 'true'
        run: npm run check

      - name: Build
        if: steps.existing_release.outputs.published != 'true'
        run: npm run build

      - name: Resolve next patch version
        if: steps.existing_release.outputs.published != 'true'
        id: version
        env:
          VERSION_BASELINE: "0.6.6"
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const cp = require("node:child_process");

          const pkgPath = "package.json";
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          const versions = [process.env.VERSION_BASELINE];

          function addVersion(candidate) {
            if (typeof candidate !== "string") return;
            const normalized = candidate.trim().replace(/^v/, "");
            if (/^\d+\.\d+\.\d+$/.test(normalized)) versions.push(normalized);
          }

          try {
            const output = cp.execFileSync("npm", ["view", pkg.name, "versions", "--json"], {
              encoding: "utf8",
              stdio: ["ignore", "pipe", "pipe"],
            });
            const parsed = JSON.parse(output);
            if (Array.isArray(parsed)) parsed.forEach(addVersion);
            else addVersion(parsed);
          } catch (error) {
            console.warn(`Could not read npm versions for ${pkg.name}: ${error.message}`);
          }

          try {
            cp.execFileSync("git", ["fetch", "--tags", "--force"], { stdio: "ignore" });
            const tags = cp.execFileSync("git", ["tag", "-l", "v*"], { encoding: "utf8" });
            tags.split(/\r?\n/).forEach(addVersion);
          } catch (error) {
            console.warn(`Could not read git tags: ${error.message}`);
          }

          function parse(version) {
            const [major, minor, patch] = version.split(".").map((part) => Number.parseInt(part, 10));
            return { major, minor, patch, version };
          }

          versions.sort((a, b) => {
            const left = parse(a);
            const right = parse(b);
            return left.major - right.major || left.minor - right.minor || left.patch - right.patch;
          });

          const highest = parse(versions.at(-1));
          const nextVersion = `${highest.major}.${highest.minor}.${highest.patch + 1}`;
          pkg.version = nextVersion;
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `next_version=${nextVersion}\n`);
          console.log(`Publishing ${pkg.name}@${nextVersion}`);
          NODE

      - name: Pack exact candidate
        if: steps.existing_release.outputs.published != 'true'
        id: pack
        run: |
          set -euo pipefail
          npm pack --json --ignore-scripts > "$RUNNER_TEMP/pack.json"
          tarball="$(node -e 'const p=require(process.argv[1]); process.stdout.write(p[0].filename)' "$RUNNER_TEMP/pack.json")"
          sha256sum "$tarball"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Validate live canary configuration
        if: steps.existing_release.outputs.published != 'true'
        run: |
          set -euo pipefail
          for name in SDK_CANARY_INGEST_KEY SDK_CANARY_READ_API_KEY SDK_CANARY_MCP_SERVER_ID SDK_CANARY_PLATFORM_URL SDK_CANARY_DISPATCH_SECRET VERCEL_TOKEN VERCEL_ORG_ID VERCEL_SCOPE SDK_CANARY_VERCEL_PROJECT_ID SDK_CANARY_MCP_URL; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing ${name} in the sdk-canary-dev environment." >&2
              exit 1
            fi
          done

      - name: Test exact candidate and Armature readback
        if: steps.existing_release.outputs.published != 'true'
        run: node scripts/run-publish-canary.mjs --require-platform --artifact "${{ steps.pack.outputs.tarball }}"

      - name: Install Vercel CLI
        if: steps.existing_release.outputs.published != 'true'
        run: npm install --global vercel@55.0.0

      - name: Deploy and promote exact candidate
        if: steps.existing_release.outputs.published != 'true'
        run: node canary/deploy-vercel.mjs --artifact "${{ steps.pack.outputs.tarball }}" --marker "sdk-canary/typescript/${GITHUB_SHA}/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Verify real Claude Code and Codex session isolation
        if: steps.existing_release.outputs.published != 'true'
        run: node canary/run-harness-canary.mjs --package typescript --marker "sdk-canary/typescript/${GITHUB_SHA}/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Publish
        if: steps.existing_release.outputs.published != 'true'
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.existing_release.outputs.published != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          set -euo pipefail
          gh release create "v${NEXT_VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "v${NEXT_VERSION}" \
            --notes "Published @armature-tech/mcp-analytics@${NEXT_VERSION} from ${GITHUB_SHA}."
